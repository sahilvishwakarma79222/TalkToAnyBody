<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkToAnyBody</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', Helvetica, Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 420px;
            width: 90%;
            padding: 48px 0;
        }
        
        .logo {
            margin-bottom: 56px;
        }
        
        .logo h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #2d2d2d;
            letter-spacing: -0.3px;
        }
        
        .logo h1 span {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec489a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
        }
        
        .logo p {
            color: #6c6c6c;
            margin-top: 8px;
            font-size: 0.9rem;
        }
        
        .input-group {
            margin-bottom: 28px;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 0;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid #e5e5e5;
            font-size: 1rem;
            color: #2d2d2d;
            transition: all 0.2s;
        }
        
        .input-group input:focus {
            outline: none;
            border-bottom-color: #8b5cf6;
        }
        
        .input-group input::placeholder {
            color: #aaa;
            font-weight: 400;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #2d2d2d;
            color: white;
            border: none;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 0;
        }
        
        button:hover {
            background: linear-gradient(135deg, #8b5cf6, #ec489a);
        }
        
        .info {
            margin-top: 40px;
            color: #aaa;
            font-size: 0.75rem;
            text-align: center;
            line-height: 1.5;
        }
        
        .info a {
            color: #8b5cf6;
            text-decoration: none;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 32px 0;
            }
            
            .logo h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>TalkTo<span>AnyBody</span></h1>
            <p>Start a conversation</p>
        </div>
        
        <form action="/join" method="post">
            <div class="input-group">
                <input type="text" 
                       name="username" 
                       placeholder="Your name" 
                       required
                       autocomplete="off"
                       autofocus>
            </div>
            <button type="submit">Continue →</button>
        </form>
        
        <div class="info">
            Global · Private rooms · Voice & video
        </div>
    </div>
    
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const input = this.querySelector('input');
            if (!input.value.trim()) {
                e.preventDefault();
                input.style.borderBottomColor = '#ec489a';
                setTimeout(() => {
                    input.style.borderBottomColor = '#e5e5e5';
                }, 1500);
            }
        });
    </script>
</body>
</html>
