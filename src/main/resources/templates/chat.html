<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<!-- PeerJS Library -->
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<!-- WebRTC Adapter -->
<script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>TalkToAnybody</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --light-bg: #f5f7fb;
            --light-surface: #ffffff;
            --light-surface-2: #f0f2f5;
            --light-border: #e4e6eb;
            --light-text: #1a1a2e;
            --light-text-secondary: #65676b;
            --light-header: #ffffff;
            --dark-bg: #18191a;
            --dark-surface: #242526;
            --dark-surface-2: #3a3b3c;
            --dark-border: #3e4042;
            --dark-text: #e4e6eb;
            --dark-text-secondary: #b0b3b8;
            --dark-header: #242526;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --error: #ef4444;
        }
        
        body {
            --bg: var(--light-bg);
            --surface: var(--light-surface);
            --surface-2: var(--light-surface-2);
            --border: var(--light-border);
            --text: var(--light-text);
            --text-secondary: var(--light-text-secondary);
            --header: var(--light-header);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
        }
        
        body.dark {
            --bg: var(--dark-bg);
            --surface: var(--dark-surface);
            --surface-2: var(--dark-surface-2);
            --border: var(--dark-border);
            --text: var(--dark-text);
            --text-secondary: var(--dark-text-secondary);
            --header: var(--dark-header);
        }
        
        /* ========== NAVBAR ========== */
        .navbar {
            background: var(--header);
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 56px;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .sidebar-minimize-btn {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: none;
            align-items: center;
            justify-content: center;
        }
        
        .sidebar-minimize-btn:hover {
            background: var(--surface-2);
        }
        
        /* Mobile menu button - for sidebar */
        .mobile-menu-btn {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .mobile-menu-btn:hover {
            background: var(--surface-2);
        }
        
        /* Desktop action buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        /* Mobile action button */
        .mobile-action-btn {
            display: none;
            background: var(--surface-2);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }
        
        .nav-btn {
            background: var(--surface-2);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--text);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .nav-btn:hover {
            background: var(--primary);
            color: white;
        }
        
        .leave-room-btn {
            background: var(--error);
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            display: none;
        }
        
        .user-info {
            background: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            color: white;
        }
        
        .theme-toggle {
            background: var(--surface-2);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* ========== MAIN LAYOUT ========== */
        .main-layout {
            display: flex;
            height: 100vh;
            padding-top: 56px;
        }
        
        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            flex-shrink: 0;
        }
        
        /* Desktop minimized */
        .sidebar.minimized {
            width: 60px;
        }
        
        .sidebar.minimized .sidebar-header h3,
        .sidebar.minimized .room-badge,
        .sidebar.minimized .user-name {
            display: none;
        }
        
        .sidebar.minimized .user-item {
            justify-content: center;
            padding: 12px;
        }
        
        .sidebar.minimized .user-item::before {
            margin: 0;
        }
        
        /* Mobile sidebar - slide from left */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 56px;
                bottom: 0;
                z-index: 200;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 280px;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .sidebar-header h3 {
            color: var(--text);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .room-badge {
            font-size: 0.7rem;
            background: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            color: white;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .user-item {
            padding: 10px 12px;
            border-radius: 10px;
            margin-bottom: 4px;
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
        }
        
        .user-item:hover {
            background: var(--primary);
            color: white;
        }
        
        .user-item::before {
            content: "👤";
            font-size: 1rem;
        }
        
        .user-name {
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        /* ========== CHAT AREA ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
        }
        
        .chat-header {
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-title {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
        }
        
        .call-btn {
            background: var(--primary);
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        /* ========== MESSAGES ========== */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 65%;
            padding: 8px 14px;
            border-radius: 18px;
        }
        
        .message:not(.own) {
            background: var(--surface);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message.own {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }
        
        .message-sender {
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .message:not(.own) .message-sender {
            color: var(--primary);
        }
        
        .message-time {
            font-size: 0.6rem;
            opacity: 0.7;
        }
        
        .message-content {
            font-size: 0.85rem;
            word-wrap: break-word;
        }
        
        /* ========== INPUT AREA ========== */
        .input-area {
            padding: 12px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .input-btn {
            background: var(--surface-2);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .message-input {
            flex: 1;
            padding: 10px 16px;
            background: var(--surface-2);
            border: none;
            border-radius: 24px;
            color: var(--text);
            font-size: 0.9rem;
        }
        
        .message-input:focus {
            outline: none;
        }
        
        .send-btn {
            background: var(--primary);
            border: none;
            padding: 8px 20px;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }
        
        /* ========== FLOATING CALL ========== */
        .floating-call {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 280px;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 1100;
            overflow: hidden;
            display: none;
            border: 1px solid var(--border);
        }
        
        .floating-call.minimized {
            width: 50px;
            height: 50px;
            border-radius: 25px;
        }
        
        .floating-call.minimized .call-header-text,
        .floating-call.minimized .call-controls-floating,
        .floating-call.minimized .call-videos-floating {
            display: none;
        }
        
        .floating-call.minimized .call-header {
            justify-content: center;
            padding: 0;
            height: 50px;
        }
        
        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--primary);
            cursor: grab;
        }
        
        .call-header-text {
            display: flex;
            align-items: center;
            gap: 6px;
            color: white;
            font-size: 0.7rem;
        }
        
        .minimize-btn, .close-call-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
        }
        
        .call-videos-floating {
            padding: 8px;
            background: var(--surface-2);
        }
        
        .remote-video-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }
        
        .remote-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .local-video-container {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 80px;
            height: 60px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--primary);
            display: none;
        }
        
        .call-controls-floating {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 10px;
            background: var(--surface);
        }
        
        .call-control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }
        
        .call-control-btn.mute-btn {
            background: var(--surface-2);
            color: var(--text);
        }
        
        .call-control-btn.end-call-btn {
            background: var(--error);
            color: white;
        }
        
        /* ========== MODAL ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: var(--surface);
            padding: 24px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
        }
        
        .modal-content h3 {
            color: var(--text);
            margin-bottom: 16px;
            font-size: 1.1rem;
        }
        
        .modal-content input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 16px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
        }
        
        .modal-content button {
            padding: 8px 16px;
            margin-right: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .modal-btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .modal-btn-secondary {
            background: var(--surface-2);
            color: var(--text);
        }
        
        /* ========== TOAST ========== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            color: var(--text);
            padding: 8px 20px;
            border-radius: 40px;
            border-left: 3px solid var(--primary);
            z-index: 2000;
            font-size: 0.8rem;
            white-space: nowrap;
            max-width: 90%;
            text-align: center;
        }
        
        .invite-users-list {
            max-height: 250px;
            overflow-y: auto;
        }
        
        .invite-user-item {
            padding: 10px;
            margin: 6px 0;
            background: var(--surface-2);
            border-radius: 10px;
            cursor: pointer;
        }
        
        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .sidebar-minimize-btn {
                display: none;
            }
            
            .action-buttons {
                display: none;
            }
            
            .mobile-action-btn {
                display: flex;
            }
            
            .user-info {
                display: block;
                padding: 4px 10px;
                font-size: 0.7rem;
            }
            
            .message {
                max-width: 85%;
            }
            
            .floating-call {
                width: 260px;
                bottom: 70px;
                right: 10px;
            }
            
            .local-video-container {
                width: 70px;
                height: 52px;
            }
        }
        
        @media (min-width: 769px) {
            .mobile-menu-btn {
                display: none;
            }
            
            .sidebar-minimize-btn {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <!-- Desktop sidebar minimize button -->
            <button class="sidebar-minimize-btn" id="sidebarMinimizeBtn" title="Minimize sidebar">◀</button>
            <!-- Mobile sidebar open button -->
            <button class="mobile-menu-btn" id="mobileMenuBtn" title="Open sidebar">☰</button>
            
            <!-- Desktop action buttons -->
            <div class="action-buttons" id="desktopActions">
                <button class="nav-btn" onclick="showCreateRoomModal()">➕ Create</button>
                <button class="nav-btn" onclick="showJoinRoomModal()">🔗 Join</button>
                <button class="nav-btn" onclick="joinFixedRoom()">⭐ Fixed</button>
            </div>
            
            <!-- Mobile action button -->
            <button class="mobile-action-btn" id="mobileActionBtn" title="Menu">⋮</button>
            
            <div class="nav-title">TalkToAnybody</div>
        </div>
        <div class="nav-right">
            <div class="user-info" th:text="${username}"></div>
            <button id="leaveRoomBtn" class="leave-room-btn" onclick="leaveRoom()">🚪 Leave</button>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>
    </div>
    
    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Active Chats</h3>
                <span class="room-badge" id="roomBadge">Global Chat</span>
            </div>
            <div class="users-list" id="usersList">
                <div class="user-item"><div class="user-name">Loading users...</div></div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-title" id="chatTitle">Global Chat</div>
                <div class="call-controls" id="callControls" style="display: none;">
                    <button class="call-btn" onclick="startVideoCall()">📹 Video Call</button>
                </div>
            </div>
            
            <div class="messages-container" id="messages">
                <div class="message">
                    <div class="message-header">
                        <span class="message-sender">TalkToAnybody</span>
                        <span class="message-time">Now</span>
                    </div>
                    <div class="message-content">✨ Welcome! Start chatting...</div>
                </div>
            </div>
            
            <div class="input-area">
                <button class="input-btn" onclick="openEmojiPicker()">😊</button>
                <button class="input-btn" onclick="uploadImage()">📷</button>
                <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    
    <!-- Mobile Action Dropdown Modal -->
    <div id="mobileActionModal" class="modal">
        <div class="modal-content">
            <h3>Menu</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="modal-btn-primary" onclick="showCreateRoomModal(); closeModal('mobileActionModal')">➕ Create Room</button>
                <button class="modal-btn-primary" onclick="showJoinRoomModal(); closeModal('mobileActionModal')">🔗 Join Room</button>
                <button class="modal-btn-primary" onclick="joinFixedRoom(); closeModal('mobileActionModal')">⭐ Fixed Room</button>
                <button class="modal-btn-secondary" onclick="closeModal('mobileActionModal')">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- Floating Call Window -->
    <div id="floatingCall" class="floating-call">
        <div class="call-header" id="callHeader">
            <div class="call-header-text">
                <span class="call-icon" id="callIcon">📹</span>
                <span id="callStatus">Calling...</span>
                <span class="call-duration" id="callDuration">00:00</span>
            </div>
            <div class="header-actions">
                <button class="minimize-btn" onclick="toggleMinimizeCall()">−</button>
                <button class="close-call-btn" onclick="endCall()">✕</button>
            </div>
        </div>
        <div class="call-videos-floating">
            <div class="remote-video-container">
                <video id="remoteVideoFloating" autoplay playsinline></video>
            </div>
            <div class="local-video-container" id="localVideoContainer">
                <video id="localVideoFloating" autoplay muted playsinline></video>
            </div>
        </div>
        <div class="call-controls-floating">
            <button class="call-control-btn mute-btn" id="floatingMuteBtn" onclick="toggleFloatingMute()">🔊</button>
            <button class="call-control-btn end-call-btn" onclick="endCall()">📞</button>
        </div>
    </div>
    
    <!-- Modals -->
    <div id="createRoomModal" class="modal">
        <div class="modal-content">
            <h3>Create Private Room</h3>
            <input type="password" id="roomPassword" placeholder="Set room password">
            <button class="modal-btn-primary" onclick="createRoom()">Create</button>
            <button class="modal-btn-secondary" onclick="closeModal('createRoomModal')">Cancel</button>
        </div>
    </div>
    
    <div id="joinRoomModal" class="modal">
        <div class="modal-content">
            <h3>Join Private Room</h3>
            <input type="text" id="joinRoomId" placeholder="Room ID">
            <input type="password" id="joinRoomPass" placeholder="Password">
            <button class="modal-btn-primary" onclick="joinRoom()">Join</button>
            <button class="modal-btn-secondary" onclick="closeModal('joinRoomModal')">Cancel</button>
        </div>
    </div>
    
    <div id="inviteModal" class="modal">
        <div class="modal-content">
            <h3>Invite User</h3>
            <div id="inviteUsersList" class="invite-users-list">Loading...</div>
            <button class="modal-btn-secondary" onclick="closeModal('inviteModal')">Cancel</button>
        </div>
    </div>
    
    <!-- WebSocket Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    
    <script th:inline="javascript">
        /*<![CDATA[*/
        let currentRoomType = 'GLOBAL';
        let currentRoomId = null;
        let userId = /*[[${userId}]]*/ null;
        let username = /*[[${username}]]*/ null;
        let stompClient = null;
        let retryCount = 0;
        
        let activeSubscriptions = { global: null, private: null };
        
        let peer = null;
        let currentCall = null;
        let localPeerStream = null;
        let callActive = false;
        let callStartTime = null;
        let callDurationInterval = null;
        let isCallMinimized = false;
        let isMuted = false;
        
        let lastToastMessage = null;
        let lastToastTime = 0;
        let otherUserPeerId = null;
        let isCallInitiating = false;
        let isSidebarMinimized = false;
        /*]]>*/
    </script>
    
    <script>
        // ============ Sidebar Functions ==========
        const sidebar = document.getElementById('sidebar');
        const sidebarMinimizeBtn = document.getElementById('sidebarMinimizeBtn');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileActionBtn = document.getElementById('mobileActionBtn');
        
        // Desktop sidebar minimize
        if (sidebarMinimizeBtn) {
            sidebarMinimizeBtn.addEventListener('click', () => {
                isSidebarMinimized = !isSidebarMinimized;
                if (isSidebarMinimized) {
                    sidebar.classList.add('minimized');
                    sidebarMinimizeBtn.innerHTML = '▶';
                } else {
                    sidebar.classList.remove('minimized');
                    sidebarMinimizeBtn.innerHTML = '◀';
                }
            });
        }
        
        // Mobile sidebar open
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => {
                sidebar.classList.toggle('open');
            });
        }
        
        // Mobile action modal
        if (mobileActionBtn) {
            mobileActionBtn.addEventListener('click', () => {
                document.getElementById('mobileActionModal').style.display = 'flex';
            });
        }
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                if (sidebar && mobileMenuBtn && !sidebar.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });
        
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
        
        function showCreateRoomModal() { document.getElementById('createRoomModal').style.display = 'flex'; }
        function showJoinRoomModal() { document.getElementById('joinRoomModal').style.display = 'flex'; }
        
        function closeModal(modalId) {
            let modal = document.getElementById(modalId);
            if (modal) {
                modal.style.display = 'none';
                modal.querySelectorAll('input').forEach(input => input.value = '');
            }
        }
        
        function showToast(message, type) {
            const now = Date.now();
            if (lastToastMessage === message && now - lastToastTime < 2000) return;
            lastToastMessage = message;
            lastToastTime = now;
            
            let toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // Create Room
        function createRoom() {
            let password = document.getElementById('roomPassword').value;
            if (!password) { showToast('Please enter a password', 'error'); return; }
            
            showToast('Creating room...', 'info');
            closeModal('createRoomModal');
            
            fetch('/api/room/create?userId=' + userId, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) { showToast(data.error, 'error'); }
                else {
                    showToast('Room created! ID: ' + data.roomId, 'success');
                    let roomDetails = `Room ID: ${data.roomId}\nPassword: ${data.password}`;
                    if (confirm(`Room created!\n\n${roomDetails}\n\nCopy?`)) {
                        navigator.clipboard.writeText(`Room ID: ${data.roomId}\nPassword: ${data.password}`);
                        showToast('Copied!', 'success');
                    }
                    switchToPrivateRoom(data.roomId);
                }
            })
            .catch(error => { showToast('Failed to create room', 'error'); });
            
            document.getElementById('roomPassword').value = '';
        }
        
        function joinRoom() {
            let roomId = document.getElementById('joinRoomId').value;
            let password = document.getElementById('joinRoomPass').value;
            if (!roomId || !password) { showToast('Please enter Room ID and Password', 'error'); return; }
            
            closeModal('joinRoomModal');
            joinPrivateRoom(roomId, password);
        }
        
        function joinPrivateRoom(roomId, password) {
            showToast('Joining room...', 'info');
            fetch('/api/room/join?userId=' + userId, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomId: roomId, password: password })
            })
            .then(response => {
                if (!response.ok) return response.json().then(err => { throw new Error(err.error || 'Failed to join'); });
                return response.json();
            })
            .then(data => {
                if (data.error) { showToast(data.error, 'error'); }
                else { showToast('Joined room: ' + roomId, 'success'); switchToPrivateRoom(roomId); }
            })
            .catch(error => { showToast(error.message || 'Failed to join', 'error'); });
        }
        
        function joinFixedRoom() {
            if (currentRoomType === 'PRIVATE' && currentRoomId) {
                showToast('Leaving current room...', 'info');
                fetch('/api/room/leave?userId=' + userId, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomId: currentRoomId })
                })
                .then(() => { switchToGlobalChat(); showFixedRoomModal(); })
                .catch(() => { showFixedRoomModal(); });
            } else {
                showFixedRoomModal();
            }
        }
        
        function showFixedRoomModal() {
            let existingModal = document.querySelector('.modal');
            if (existingModal && existingModal.id !== 'mobileActionModal') existingModal.remove();
            
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>Join Fixed Room</h3>
                    <input type="text" id="fixedRoomId" placeholder="Room ID" autofocus>
                    <input type="password" id="fixedRoomPass" placeholder="Password">
                    <div>
                        <button class="modal-btn-primary" id="fixedJoinBtn">Join</button>
                        <button class="modal-btn-secondary" onclick="this.closest('.modal').remove()">Cancel</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            document.getElementById('fixedJoinBtn').onclick = function() {
                let roomId = document.getElementById('fixedRoomId').value.trim();
                let password = document.getElementById('fixedRoomPass').value.trim();
                if (!roomId || !password) { showToast('Enter Room ID and Password', 'error'); return; }
                modal.remove();
                
                const FIXED_ROOM_ID = 'jojo';
                const FIXED_ROOM_PASS = '123456';
                
                if (roomId === FIXED_ROOM_ID && password === FIXED_ROOM_PASS) {
                    showToast('Joining fixed room...', 'info');
                    fetch('/api/room/fixed')
                        .then(response => response.json())
                        .then(data => {
                            if (data.roomId) joinPrivateRoom(data.roomId, data.password);
                            else showToast('Failed to join', 'error');
                        })
                        .catch(error => { showToast('Failed to join', 'error'); });
                } else {
                    showToast('Invalid Room ID or Password!', 'error');
                }
            };
        }
        
        function switchToPrivateRoom(roomId) {
            if (!stompClient || !stompClient.connected) {
                showToast('Connecting...', 'info');
                setTimeout(() => { if (stompClient?.connected) switchToPrivateRoom(roomId); }, 1000);
                return;
            }
            
            if (activeSubscriptions.private) {
                try { activeSubscriptions.private.unsubscribe(); } catch(e) {}
                activeSubscriptions.private = null;
            }
            
            currentRoomType = 'PRIVATE';
            currentRoomId = roomId;
            
            document.getElementById('roomBadge').innerHTML = '🔒 Private';
            document.getElementById('chatTitle').innerHTML = 'Private Room';
            document.getElementById('callControls').style.display = 'flex';
            document.getElementById('leaveRoomBtn').style.display = 'block';
            document.getElementById('messages').innerHTML = '';
            loadPrivateRoomMessages(roomId);
            
            if (stompClient?.connected) {
                activeSubscriptions.private = stompClient.subscribe('/topic/room/' + roomId, function(message) {
                    displayMessage(JSON.parse(message.body));
                });
                stompClient.send("/app/chat.private.join", {}, JSON.stringify({ roomId: roomId, userId: userId, username: username }));
            }
            
            fetch('/api/user/update-room?userId=' + userId, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomType: "PRIVATE", roomId: roomId })
            });
            
            initPeerJS();
            showToast('Now in private room', 'success');
        }
        
        function leaveRoom() {
            if (currentRoomType === 'PRIVATE' && currentRoomId) {
                fetch('/api/room/leave?userId=' + userId, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomId: currentRoomId })
                })
                .then(() => { showToast('Left private room', 'success'); switchToGlobalChat(); });
            }
        }
        
        function switchToGlobalChat() {
            if (currentRoomType === 'PRIVATE' && currentRoomId && stompClient?.connected) {
                stompClient.send("/app/chat.private.leave", {}, JSON.stringify({ roomId: currentRoomId, userId: userId, username: username }));
            }
            if (activeSubscriptions.private) { activeSubscriptions.private.unsubscribe(); activeSubscriptions.private = null; }
            
            if (peer) { peer.destroy(); peer = null; }
            otherUserPeerId = null;
            isCallInitiating = false;
            
            currentRoomType = 'GLOBAL';
            currentRoomId = null;
            document.getElementById('roomBadge').innerHTML = 'Global Chat';
            document.getElementById('chatTitle').innerHTML = 'Global Chat';
            document.getElementById('callControls').style.display = 'none';
            document.getElementById('leaveRoomBtn').style.display = 'none';
            loadRecentMessages();
        }
        
        function loadPrivateRoomMessages(roomId) {
            fetch('/api/messages/recent?roomType=PRIVATE&roomId=' + roomId + '&limit=50')
                .then(response => response.json())
                .then(messages => {
                    const container = document.getElementById('messages');
                    container.innerHTML = '';
                    messages.reverse().forEach(msg => displayMessage(msg));
                    container.scrollTop = container.scrollHeight;
                });
        }
        
        // ============ PeerJS Video Call ==========
        function initPeerJS() {
            if (peer) return;
            peer = new Peer();
            
            peer.on('open', (id) => {
                console.log('PeerJS ready:', id);
                stompClient.send("/app/chat.private.send", {}, JSON.stringify({
                    content: "🎥 PEER_READY:" + id,
                    messageType: "TEXT",
                    userId: userId,
                    username: username,
                    roomType: currentRoomType,
                    roomId: currentRoomId
                }));
            });
            
            peer.on('call', (call) => {
                if (!callActive && !currentCall) {
                    showToast('Incoming video call!', 'info');
                    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                        .then((stream) => {
                            localPeerStream = stream;
                            call.answer(stream);
                            setupPeerCall(stream, call);
                        })
                        .catch(err => { call.close(); });
                } else {
                    call.close();
                }
            });
        }
        
        function startVideoCall() {
            if (currentRoomType !== 'PRIVATE') { showToast('Calls only in private rooms!', 'error'); return; }
            if (!peer) { initPeerJS(); setTimeout(() => startVideoCall(), 1000); return; }
            if (callActive || currentCall) { showToast('Already in a call!', 'info'); return; }
            
            if (otherUserPeerId) {
                makeCall(otherUserPeerId);
            } else {
                showToast('Waiting for other user...', 'info');
                let waitCount = 0;
                const waitInterval = setInterval(() => {
                    waitCount++;
                    if (otherUserPeerId) {
                        clearInterval(waitInterval);
                        makeCall(otherUserPeerId);
                    } else if (waitCount > 30) {
                        clearInterval(waitInterval);
                        showToast('Other user not ready', 'error');
                    }
                }, 1000);
            }
        }
        
        function makeCall(targetPeerId) {
            if (isCallInitiating) return;
            isCallInitiating = true;
            
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then((stream) => {
                    localPeerStream = stream;
                    currentCall = peer.call(targetPeerId, stream, { metadata: { callerName: username } });
                    setupPeerCall(stream, currentCall);
                })
                .catch(err => { showToast('Camera/mic access failed', 'error'); isCallInitiating = false; });
        }
        
        function setupPeerCall(myStream, call) {
            document.getElementById('localVideoFloating').srcObject = myStream;
            document.getElementById('localVideoContainer').style.display = 'block';
            showFloatingCall();
            
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideoFloating').srcObject = remoteStream;
                callActive = true;
                document.getElementById('callStatus').innerHTML = 'Connected';
                startCallDuration();
                isCallInitiating = false;
            });
            call.on('close', () => endCall());
        }
        
        function handlePeerMessage(content) {
            if (content.startsWith('🎥 PEER_READY:')) {
                const peerId = content.split(':')[1];
                if (peerId !== peer?.id) {
                    otherUserPeerId = peerId;
                    showToast('Other user ready! Tap Video Call', 'success');
                }
            }
        }
        
        function endCall() {
            if (currentCall) { currentCall.close(); currentCall = null; }
            if (localPeerStream) { localPeerStream.getTracks().forEach(t => t.stop()); localPeerStream = null; }
            
            const remoteVideo = document.getElementById('remoteVideoFloating');
            const localVideo = document.getElementById('localVideoFloating');
            if (remoteVideo) { remoteVideo.pause(); remoteVideo.srcObject = null; }
            if (localVideo) { localVideo.pause(); localVideo.srcObject = null; }
            
            callActive = false;
            isCallInitiating = false;
            if (callDurationInterval) clearInterval(callDurationInterval);
            callStartTime = null;
            hideFloatingCall();
            showToast('Call ended', 'info');
        }
        
        function showFloatingCall() {
            document.getElementById('floatingCall').style.display = 'block';
            isCallMinimized = false;
            document.getElementById('floatingCall').classList.remove('minimized');
        }
        
        function hideFloatingCall() {
            document.getElementById('floatingCall').style.display = 'none';
            if (callDurationInterval) clearInterval(callDurationInterval);
        }
        
        function toggleMinimizeCall() {
            isCallMinimized = !isCallMinimized;
            const el = document.getElementById('floatingCall');
            if (isCallMinimized) el.classList.add('minimized');
            else el.classList.remove('minimized');
        }
        
        function startCallDuration() {
            callStartTime = Date.now();
            if (callDurationInterval) clearInterval(callDurationInterval);
            callDurationInterval = setInterval(() => {
                if (!callStartTime) return;
                const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                const mins = Math.floor(elapsed / 60);
                const secs = elapsed % 60;
                document.getElementById('callDuration').textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }
        
        function toggleFloatingMute() {
            if (localPeerStream) {
                localPeerStream.getAudioTracks().forEach(t => t.enabled = !t.enabled);
                isMuted = !isMuted;
                const btn = document.getElementById('floatingMuteBtn');
                btn.innerHTML = isMuted ? '🔇' : '🔊';
            }
        }
        
        function makeDraggable() {
            const floatingCall = document.getElementById('floatingCall');
            const header = document.getElementById('callHeader');
            let isDragging = false, offsetX, offsetY;
            
            header.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('minimize-btn') || e.target.classList.contains('close-call-btn')) return;
                isDragging = true;
                offsetX = e.clientX - floatingCall.offsetLeft;
                offsetY = e.clientY - floatingCall.offsetTop;
                floatingCall.style.cursor = 'grabbing';
                e.preventDefault();
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                let left = e.clientX - offsetX;
                let top = e.clientY - offsetY;
                left = Math.max(0, Math.min(left, window.innerWidth - floatingCall.offsetWidth));
                top = Math.max(0, Math.min(top, window.innerHeight - floatingCall.offsetHeight));
                floatingCall.style.left = left + 'px';
                floatingCall.style.right = 'auto';
                floatingCall.style.top = top + 'px';
                floatingCall.style.bottom = 'auto';
            });
            
            document.addEventListener('mouseup', () => { isDragging = false; floatingCall.style.cursor = ''; });
        }
        
        // ============ WebSocket ==========
        function waitForLibraries() {
            if (typeof Stomp !== 'undefined' && typeof SockJS !== 'undefined') connectWebSocket();
            else if (retryCount < 20) { retryCount++; setTimeout(waitForLibraries, 500); }
            else showToast('Failed to connect. Refresh.', 'error');
        }
        
        let reconnectAttempts = 0, reconnectTimeout = null;
        
        function connectWebSocket() {
            if (reconnectTimeout) clearTimeout(reconnectTimeout);
            try {
                const socket = new SockJS('/ws');
                stompClient = Stomp.over(socket);
                stompClient.debug = null;
                stompClient.connect({}, 
                    () => {
                        reconnectAttempts = 0;
                        if (window.heartbeatInterval) clearInterval(window.heartbeatInterval);
                        window.heartbeatInterval = setInterval(() => {
                            if (stompClient?.connected) stompClient.send("/app/ping", {}, {});
                        }, 30000);
                        onConnected();
                    },
                    () => {
                        reconnectAttempts++;
                        let delay = Math.min(2000 * Math.pow(2, reconnectAttempts - 1), 30000);
                        reconnectTimeout = setTimeout(() => connectWebSocket(), delay);
                    }
                );
            } catch(e) { reconnectTimeout = setTimeout(connectWebSocket, 5000); }
        }
        
        function onConnected() {
            stompClient.subscribe('/topic/global', msg => { if (currentRoomType === 'GLOBAL') displayMessage(JSON.parse(msg.body)); });
            stompClient.subscribe('/topic/users', msg => updateUsersList(JSON.parse(msg.body)));
            stompClient.subscribe('/user/' + userId + '/queue/invites', handleInvite);
            stompClient.send("/app/chat.join", {}, JSON.stringify({ content: username + " joined", messageType: "TEXT", username: username }));
            stompClient.send("/app/chat.users", {}, {});
            loadRecentMessages();
        }
        
        function handleInvite(invite) {
            const data = JSON.parse(invite.body);
            if (data.type === 'INVITE' && confirm(`${data.fromUser} invited you! Accept?`)) {
                fetch('/api/invite/accept?userId=' + userId, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ inviteId: data.inviteId })
                }).then(r => r.json()).then(d => { if (!d.error) switchToPrivateRoom(d.roomId); });
            }
        }
        
        function sendMessage() {
            let input = document.getElementById('messageInput');
            let content = input.value.trim();
            if (!content || !stompClient?.connected) return;
            stompClient.send(currentRoomType === 'PRIVATE' ? "/app/chat.private.send" : "/app/chat.send", {}, JSON.stringify({
                content, messageType: "TEXT", userId, username, roomType: currentRoomType, roomId: currentRoomId
            }));
            input.value = '';
        }
        
        function displayMessage(message) {
            if (message.content?.startsWith('🎥 PEER_READY:')) handlePeerMessage(message.content);
            
            const container = document.getElementById('messages');
            const isOwn = message.userId === userId;
            const div = document.createElement('div');
            div.className = 'message' + (isOwn ? ' own' : '');
            div.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">${escapeHtml(message.username)}</span>
                    <span class="message-time">${escapeHtml(message.timestamp)}</span>
                </div>
                <div class="message-content">${escapeHtml(message.content)}</div>
            `;
            container.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }
        
        function updateUsersList(users) {
            const container = document.getElementById('usersList');
            const otherUsers = (users || []).filter(u => u.id !== userId);
            if (otherUsers.length === 0) {
                container.innerHTML = '<div class="user-item"><div class="user-name">No other users online</div></div>';
            } else {
                container.innerHTML = otherUsers.map(user => `
                    <div class="user-item" onclick="showInviteModal()">
                        <div class="user-name">${escapeHtml(user.username)}</div>
                    </div>
                `).join('');
            }
        }
        
        function loadRecentMessages() {
            fetch('/api/messages/recent?roomType=GLOBAL&limit=50')
                .then(response => response.json())
                .then(messages => {
                    const container = document.getElementById('messages');
                    container.innerHTML = '';
                    if (messages.length === 0) {
                        container.innerHTML = '<div class="message"><div class="message-header"><span class="message-sender">TalkToAnybody</span><span class="message-time">Now</span></div><div class="message-content">✨ Welcome to TalkToAnybody!</div></div>';
                    } else {
                        messages.reverse().forEach(msg => displayMessage(msg));
                    }
                });
        }
        
        function showInviteModal() {
            fetch('/api/users/online')
                .then(response => response.json())
                .then(users => {
                    const otherUsers = users.filter(u => u.id !== userId);
                    const container = document.getElementById('inviteUsersList');
                    if (otherUsers.length === 0) container.innerHTML = '<div class="invite-user-item">No other users online</div>';
                    else {
                        container.innerHTML = otherUsers.map(user => `
                            <div class="invite-user-item" onclick="sendInvite('${user.id}', '${escapeHtml(user.username)}')">
                                👤 ${escapeHtml(user.username)}
                            </div>
                        `).join('');
                    }
                });
            document.getElementById('inviteModal').style.display = 'flex';
        }
        
        function sendInvite(toUserId, toUsername) {
            showToast(`Inviting ${toUsername}...`, 'info');
            fetch('/api/invite/send?userId=' + userId, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomId: currentRoomId, toUserId: toUserId })
            }).then(r => r.json()).then(data => {
                if (data.error) showToast(data.error, 'error');
                else showToast(`Invite sent to ${toUsername}!`, 'success');
            });
            closeModal('inviteModal');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        const emojis = ['😊', '😂', '❤️', '👍', '🔥', '🎉', '😢', '😡', '😎', '🤔', '🥳', '😍'];
        function openEmojiPicker() {
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>Choose Emoji</h3>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0;">
                        ${emojis.map(e => `<button onclick="insertEmoji('${e}')" style="width: 44px; height: 44px; font-size: 1.5rem; background: var(--surface-2); border: none; border-radius: 10px; cursor: pointer;">${e}</button>`).join('')}
                    </div>
                    <button class="modal-btn-secondary" onclick="this.closest('.modal').remove()">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function insertEmoji(emoji) {
            document.getElementById('messageInput').value += emoji;
            document.querySelector('.modal').remove();
        }
        
        function uploadImage() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                let file = e.target.files[0];
                if (!file || file.size > 5 * 1024 * 1024) return showToast(file ? 'Image too large' : 'Invalid', 'error');
                let reader = new FileReader();
                reader.onload = (e) => {
                    if (!stompClient?.connected) return showToast('Not connected', 'error');
                    stompClient.send(currentRoomType === 'PRIVATE' ? "/app/chat.private.send" : "/app/chat.send", {}, JSON.stringify({
                        content: "📷 Image", messageType: "IMAGE", userId, username, roomType: currentRoomType,
                        roomId: currentRoomId, imageData: e.target.result
                    }));
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        
        window.addEventListener('beforeunload', () => {
            if (callActive) endCall();
            if (peer) peer.destroy();
            if (stompClient?.connected) {
                if (currentRoomType === 'PRIVATE' && currentRoomId) stompClient.send("/app/chat.private.leave", {}, JSON.stringify({ roomId: currentRoomId, userId, username }));
                stompClient.disconnect();
            }
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            if (userId && username) waitForLibraries();
            else window.location.href = '/';
            document.getElementById('messageInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
            makeDraggable();
        });
    </script>
</body>
</html>
