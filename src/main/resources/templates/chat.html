<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<!-- WebRTC Adapter -->
<script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VioletChat - Connect with Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --light-bg: #f8f9ff;
            --light-surface: #ffffff;
            --light-surface-2: #f0f2f8;
            --light-border: #e9ecef;
            --light-text: #1a1a2e;
            --light-text-secondary: #6c757d;
            --light-header: #ffffff;
            --dark-bg: #0f0f1a;
            --dark-surface: #1a1a2e;
            --dark-surface-2: #252538;
            --dark-border: #2d2d44;
            --dark-text: #e9ecef;
            --dark-text-secondary: #a0a0c0;
            --dark-header: #1a1a2e;
            --violet-primary: #8b5cf6;
            --violet-dark: #7c3aed;
            --violet-light: #a78bfa;
            --pink-primary: #ec489a;
            --pink-dark: #db2777;
            --pink-light: #f472b6;
            --online: #10b981;
            --offline: #6c757d;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        
        body {
            --bg: var(--light-bg);
            --surface: var(--light-surface);
            --surface-2: var(--light-surface-2);
            --border: var(--light-border);
            --text: var(--light-text);
            --text-secondary: var(--light-text-secondary);
            --header: var(--light-header);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
        }
        
        body.dark {
            --bg: var(--dark-bg);
            --surface: var(--dark-surface);
            --surface-2: var(--dark-surface-2);
            --border: var(--dark-border);
            --text: var(--dark-text);
            --text-secondary: var(--dark-text-secondary);
            --header: var(--dark-header);
        }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--surface-2); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary)); border-radius: 4px; }
        
        .navbar {
            background: var(--header);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-left { display: flex; align-items: center; gap: 12px; }
        .toggle-sidebar {
            background: var(--surface-2);
            border: none;
            color: var(--text);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-sidebar:hover { background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary)); color: white; transform: scale(1.05); }
        .nav-title {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .nav-btn {
            background: var(--surface-2);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .nav-btn:hover { background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary)); color: white; transform: translateY(-1px); }
        .leave-room-btn { background: linear-gradient(135deg, var(--error), var(--pink-dark)); color: white; }
        .theme-toggle {
            background: var(--surface-2);
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .theme-toggle:hover { background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary)); transform: rotate(15deg); }
        .user-info {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
        }
        
        .main-layout { display: flex; height: calc(100vh - 60px); position: relative; }
        .sidebar {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }
        .sidebar.hidden { transform: translateX(-100%); }
        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); background: var(--surface); }
        .sidebar-header h3 { color: var(--text); margin-bottom: 8px; font-size: 1.1rem; }
        .room-badge {
            font-size: 0.75rem;
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            padding: 4px 10px;
            border-radius: 12px;
            display: inline-block;
            color: white;
            font-weight: 500;
        }
        .users-list { flex: 1; overflow-y: auto; padding: 8px; }
        .user-item {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 4px;
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-item::before { content: "👤"; font-size: 1.2rem; }
        .user-item:hover { background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary)); color: white; transform: translateX(4px); }
        .user-name { font-weight: 500; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .chat-header {
            padding: 15px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .chat-title { font-size: 1.1rem; font-weight: 600; color: var(--text); }
        .call-controls { display: flex; gap: 8px; }
        .call-btn {
            background: var(--surface-2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .call-btn:hover { background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary)); color: white; }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: radial-gradient(circle at 25% 50%, var(--surface-2) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message:not(.own) { background: var(--surface); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.own { background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary)); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; gap: 12px; font-size: 0.7rem; }
        .message-sender { font-weight: 600; font-size: 0.75rem; }
        .message:not(.own) .message-sender { color: var(--violet-primary); }
        .message.own .message-sender { color: rgba(255,255,255,0.9); }
        .message-time { font-size: 0.65rem; opacity: 0.7; }
        .message-content { word-wrap: break-word; font-size: 0.95rem; line-height: 1.4; }
        
        .input-area {
            padding: 12px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-btn {
            background: var(--surface-2);
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .input-btn:hover { background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary)); transform: scale(1.1); }
        .message-input {
            flex: 1;
            padding: 12px 18px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .message-input:focus { outline: none; border-color: var(--violet-primary); box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
        .send-btn {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--surface);
            padding: 28px;
            border-radius: 28px;
            min-width: 300px;
            max-width: 500px;
            animation: modalSlideIn 0.3s ease;
            border: 1px solid var(--border);
        }
        @keyframes modalSlideIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content h3 { color: var(--text); margin-bottom: 20px; font-size: 1.3rem; }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 0.95rem;
        }
        .modal-content input:focus { outline: none; border-color: var(--violet-primary); }
        .modal-content button { padding: 10px 20px; margin-right: 10px; border: none; border-radius: 20px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .modal-btn-primary { background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary)); color: white; }
        .modal-btn-secondary { background: var(--surface-2); color: var(--text); }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 40px;
            border-left: 3px solid var(--violet-primary);
            z-index: 2000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            font-size: 0.9rem;
            white-space: nowrap;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--error); }
        
        .invite-users-list { max-height: 300px; overflow-y: auto; margin: 15px 0; }
        .invite-user-item {
            padding: 12px;
            margin: 8px 0;
            background: var(--surface-2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .invite-user-item:hover { background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary)); color: white; transform: translateX(4px); }
        
        /* Floating Call Window */
        .floating-call {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 360px;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            z-index: 1100;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            display: none;
        }
        .floating-call.minimized { width: 56px; height: 56px; border-radius: 28px; }
        .floating-call.minimized .call-header-text,
        .floating-call.minimized .call-controls-floating,
        .floating-call.minimized .call-videos-floating { display: none; }
        .floating-call.minimized .call-header { justify-content: center; padding: 0; height: 56px; }
        .floating-call.minimized .minimize-btn { margin: 0; transform: rotate(180deg); }
        .call-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            cursor: grab;
            user-select: none;
        }
        .call-header:active { cursor: grabbing; }
        .call-header-text { display: flex; align-items: center; gap: 8px; color: white; font-size: 0.85rem; font-weight: 500; }
        .call-header-text .call-icon { font-size: 1.1rem; }
        .call-header-text .call-duration { font-family: monospace; font-size: 0.8rem; }
        .header-actions { display: flex; gap: 8px; }
        .minimize-btn, .close-call-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .minimize-btn:hover, .close-call-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .call-videos-floating { padding: 12px; background: var(--surface-2); }
        .remote-video-container { position: relative; background: #000; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; }
        .remote-video-container video { width: 100%; height: 100%; object-fit: cover; }
        .local-video-container {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 100px;
            height: 75px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--violet-primary);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
            display: none;
        }
        .local-video-container video { width: 100%; height: 100%; object-fit: cover; }
        .local-video-container:hover { transform: scale(1.05); border-color: var(--pink-primary); }
        .audio-call-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background: var(--surface-2);
            border-radius: 16px;
            margin: 12px;
        }
        .audio-call-indicator .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .audio-call-indicator .caller-name { font-weight: 600; color: var(--text); }
        .call-controls-floating {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 12px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .call-control-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .call-control-btn.mute-btn { background: var(--surface-2); color: var(--text); }
        .call-control-btn.mute-btn.active { background: var(--warning); color: white; }
        .call-control-btn.end-call-btn { background: var(--error); color: white; }
        .call-control-btn:hover { transform: scale(1.1); }
        
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; width: 280px; z-index: 200; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
            .sidebar.hidden { transform: translateX(-100%); }
            .message { max-width: 85%; }
            .floating-call { width: 300px; bottom: 10px; right: 10px; }
            .local-video-container { width: 80px; height: 60px; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
            <div class="nav-title">💜 VioletChat</div>
        </div>
        <div class="nav-right">
            <button class="nav-btn" onclick="showCreateRoomModal()">➕ Create</button>
            <button class="nav-btn" onclick="showJoinRoomModal()">🔗 Join</button>
            <button class="nav-btn" onclick="joinFixedRoom()">⭐ Fixed</button>
            <button id="leaveRoomBtn" class="nav-btn leave-room-btn" style="display: none;" onclick="leaveRoom()">🚪 Leave</button>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            <div class="user-info" th:text="${username}"></div>
        </div>
    </div>
    
    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>💬 Active Chats</h3>
                <span class="room-badge" id="roomBadge">Global Chat</span>
            </div>
            <div class="users-list" id="usersList">
                <div class="user-item"><div class="user-name">Loading users...</div></div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-title" id="chatTitle">Global Chat</div>
                <div class="call-controls" id="callControls" style="display: none;">
                    <button class="call-btn" onclick="startAudioCall()">🎤 Audio</button>
                    <button class="call-btn" onclick="startVideoCall()">📹 Video</button>
                </div>
            </div>
            
            <div class="messages-container" id="messages">
                <div class="message">
                    <div class="message-header">
                        <span class="message-sender">💜 VioletChat</span>
                        <span class="message-time">Now</span>
                    </div>
                    <div class="message-content">✨ Welcome! Start chatting in style...</div>
                </div>
            </div>
            
            <div class="input-area">
                <button class="input-btn" onclick="openEmojiPicker()">😊</button>
                <button class="input-btn" onclick="uploadImage()">📷</button>
                <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    
    <!-- Floating Call Window -->
    <div id="floatingCall" class="floating-call">
        <div class="call-header" id="callHeader">
            <div class="call-header-text">
                <span class="call-icon" id="callIcon">📞</span>
                <span id="callStatus">Calling...</span>
                <span class="call-duration" id="callDuration">00:00</span>
            </div>
            <div class="header-actions">
                <button class="minimize-btn" id="minimizeCallBtn" onclick="toggleMinimizeCall()">−</button>
                <button class="close-call-btn" onclick="endCall()">✕</button>
            </div>
        </div>
        <div class="call-videos-floating" id="callVideosContainer">
            <div class="remote-video-container">
                <video id="remoteVideoFloating" autoplay playsinline></video>
            </div>
            <div class="local-video-container" id="localVideoContainer">
                <video id="localVideoFloating" autoplay muted playsinline></video>
            </div>
        </div>
        <div class="audio-call-indicator" id="audioCallIndicator" style="display: none;">
            <div class="avatar">🎤</div>
            <div class="caller-name" id="callerName">Call in progress</div>
        </div>
        <div class="call-controls-floating" id="floatingCallControls">
            <button class="call-control-btn mute-btn" id="floatingMuteBtn" onclick="toggleFloatingMute()">🔊</button>
            <button class="call-control-btn end-call-btn" onclick="endCall()">📞</button>
        </div>
    </div>
    
    <!-- Modals -->
    <div id="createRoomModal" class="modal">
        <div class="modal-content">
            <h3>✨ Create Private Space</h3>
            <input type="password" id="roomPassword" placeholder="Set room password">
            <button class="modal-btn-primary" onclick="createRoom()">Create</button>
            <button class="modal-btn-secondary" onclick="closeModal('createRoomModal')">Cancel</button>
        </div>
    </div>
    
    <div id="joinRoomModal" class="modal">
        <div class="modal-content">
            <h3>🔗 Join Private Space</h3>
            <input type="text" id="joinRoomId" placeholder="Room ID">
            <input type="password" id="joinRoomPass" placeholder="Password">
            <button class="modal-btn-primary" onclick="joinRoom()">Join</button>
            <button class="modal-btn-secondary" onclick="closeModal('joinRoomModal')">Cancel</button>
        </div>
    </div>
    
    <div id="inviteModal" class="modal">
        <div class="modal-content">
            <h3>👥 Invite User</h3>
            <div id="inviteUsersList" class="invite-users-list">Loading users...</div>
            <button class="modal-btn-secondary" onclick="closeModal('inviteModal')">Cancel</button>
        </div>
    </div>
    
    <!-- WebSocket Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    
    <script th:inline="javascript">
        /*<![CDATA[*/
        let currentRoomType = 'GLOBAL';
        let currentRoomId = null;
        let userId = /*[[${userId}]]*/ null;
        let username = /*[[${username}]]*/ null;
        let stompClient = null;
        let retryCount = 0;
        
        let activeSubscriptions = { global: null, private: null };
        
        let peerConnection = null;
        let localStream = null;
        let remoteStream = null;
        let callType = null;
        let callActive = false;
        let callInProgress = false;
        let isMuted = false;
        let callStartTime = null;
        let callDurationInterval = null;
        let isCallMinimized = false;
        
        let lastToastMessage = null;
        let lastToastTime = 0;

        function updateCallDuration() {

        // Draggable
        function makeDraggable() {
            const floatingCall = document.getElementById('floatingCall');
            const header = document.getElementById('callHeader');
            let isDragging = false;
            let offsetX, offsetY;
            
            header.removeEventListener('mousedown', dragStart);
            header.addEventListener('mousedown', dragStart);
            
            function dragStart(e) {
                if (e.target.classList.contains('minimize-btn') || e.target.classList.contains('close-call-btn')) return;
                isDragging = true;
                offsetX = e.clientX - floatingCall.offsetLeft;
                offsetY = e.clientY - floatingCall.offsetTop;
                floatingCall.style.cursor = 'grabbing';
                e.preventDefault();
            }
            
            function dragMove(e) {
                if (!isDragging) return;
                let left = e.clientX - offsetX;
                let top = e.clientY - offsetY;
                left = Math.max(0, Math.min(left, window.innerWidth - floatingCall.offsetWidth));
                top = Math.max(0, Math.min(top, window.innerHeight - floatingCall.offsetHeight));
                floatingCall.style.left = left + 'px';
                floatingCall.style.right = 'auto';
                floatingCall.style.top = top + 'px';
                floatingCall.style.bottom = 'auto';
            }
            
            function dragEnd() {
                isDragging = false;
                floatingCall.style.cursor = '';
            }
            
            document.removeEventListener('mousemove', dragMove);
            document.removeEventListener('mouseup', dragEnd);
            document.addEventListener('mousemove', dragMove);
            document.addEventListener('mouseup', dragEnd);
        }
        
        // ============ PRODUCTION-READY WebRTC Call Functions ==========
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },

        function startAudioCall() {

            startCall('audio');

        function startVideoCall() {

        async function startCall(type) {
            if (callInProgress) { showToast('Call already in progress!', 'error'); return; }
            
            callType = type;
            callInProgress = true;
            pendingIceCandidates = [];
            
            try {
                const constraints = type === 'video' 
                    ? { audio: true, video: { width: { ideal: 640 }, height: { ideal: 480 } } }
                    : { audio: true, video: false };
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                console.log('✅ Got local stream');
                
                if (type === 'video') {
                    document.getElementById('localVideoFloating').srcObject = localStream;
                    document.getElementById('localVideoContainer').style.display = 'block';
                    document.getElementById('callIcon').innerHTML = '📹';
                } else {
                    document.getElementById('callIcon').innerHTML = '🎤';
                }
                
                document.getElementById('callStatus').innerHTML = 'Calling...';
                showFloatingCall();
                makeDraggable();
                
                createPeerConnection();
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                    console.log('✅ Added track:', track.kind);
                });
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                console.log('✅ Created offer');
                
                stompClient.send("/app/call.offer", {}, JSON.stringify({
                    roomId: currentRoomId, fromUserId: userId, fromUsername: username,
                    callType: callType, offer: offer
                }));
                
                // Timeout for call connection
                setTimeout(() => {
                    if (!callActive && callInProgress) {
                        console.log('⏰ Call timeout');
                        showToast('Call timed out. User may be offline.', 'error');
                        endCall();
                    }
                }, 30000);
                
            } catch (error) {
                console.error('Error starting call:', error);
                showToast('Failed to start call. Check permissions.', 'error');
                endCall();
            }
        }
        
        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            console.log('✅ Created peer connection');
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    console.log('📡 ICE candidate:', event.candidate.type);
                    stompClient.send("/app/call.ice", {}, JSON.stringify({
                        roomId: currentRoomId, fromUserId: userId, candidate: event.candidate
                    }));
                } else {
                    console.log('✅ ICE gathering complete');
                }
            };
            
            peerConnection.ontrack = (event) => {
                console.log('📺 Received remote track:', event.track.kind);
                remoteStream = event.streams[0];
                const remoteVideo = document.getElementById('remoteVideoFloating');
                remoteVideo.srcObject = remoteStream;
                remoteVideo.play().catch(e => console.log('Video play error:', e));
                
                callActive = true;
                document.getElementById('callStatus').innerHTML = 'Connected';
                startCallDuration();
                console.log('✅ Call connected!');
            };
            
            peerConnection.onconnectionstatechange = () => {
                console.log('🔄 Connection state:', peerConnection.connectionState);
                if (peerConnection.connectionState === 'connected') {
                    showToast('Call connected!', 'success');
                } else if (peerConnection.connectionState === 'failed') {
                    showToast('Call failed. Please try again.', 'error');
                    endCall();
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                console.log('🧊 ICE state:', peerConnection.iceConnectionState);
                if (peerConnection.iceConnectionState === 'failed') {
                    console.log('❌ ICE failed');
                    showToast('Connection issue. Please try again.', 'error');
                    endCall();
                }
            };
            
            // Add any pending ICE candidates
            if (pendingIceCandidates.length > 0) {
                pendingIceCandidates.forEach(candidate => {
                    peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
                });
                pendingIceCandidates = [];
            }
        }
        
        function handleIncomingCall(data) {
            console.log('📞 Incoming call from:', data.fromUsername);
            
            if (callInProgress || callActive) {
                stompClient.send("/app/call.reject", {}, JSON.stringify({
                    roomId: data.roomId, toUserId: data.fromUserId, reason: 'busy'
                }));
                return;
            }
            
            callType = data.callType;
            callInProgress = true;
            pendingIceCandidates = [];
            
            window.pendingOffer = data.offer;
            window.callerId = data.fromUserId;
            window.callerName = data.fromUsername;
            
            document.getElementById('callerName').innerHTML = data.fromUsername;
            document.getElementById('callStatus').innerHTML = `Incoming ${callType === 'video' ? 'Video' : 'Audio'} call...`;
            document.getElementById('callIcon').innerHTML = callType === 'video' ? '📹' : '🎤';
            showFloatingCall();
            makeDraggable();
            
            const muteBtn = document.getElementById('floatingMuteBtn');
            const endBtn = document.getElementById('floatingCallControls').querySelector('.end-call-btn');
            
            muteBtn.innerHTML = '✅';
            muteBtn.style.background = '#10b981';
            muteBtn.onclick = () => acceptCall();
            endBtn.onclick = () => rejectCall();
        }
        
        async function acceptCall() {
            console.log('✅ Accepting call');
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            try {
                const constraints = callType === 'video' 
                    ? { audio: true, video: { width: { ideal: 640 }, height: { ideal: 480 } } }
                    : { audio: true, video: false };
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                console.log('✅ Got local stream for answer');
                
                if (callType === 'video') {
                    document.getElementById('localVideoFloating').srcObject = localStream;
                    document.getElementById('localVideoContainer').style.display = 'block';
                }
                
                createPeerConnection();
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(window.pendingOffer));
                console.log('✅ Set remote description');
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                console.log('✅ Created answer');
                
                stompClient.send("/app/call.answer", {}, JSON.stringify({
                    roomId: currentRoomId, toUserId: window.callerId, answer: answer
                }));
                
                document.getElementById('callStatus').innerHTML = 'Connecting...';
                
                setTimeout(() => {
                    if (!callActive && callInProgress) {
                        console.log('⏰ Connection timeout');
                        showToast('Connection failed. Please try again.', 'error');
                        endCall();
                    }
                }, 30000);
                
                const muteBtn = document.getElementById('floatingMuteBtn');
                muteBtn.innerHTML = '🔊';
                muteBtn.style.background = '';
                muteBtn.onclick = toggleFloatingMute;
                document.getElementById('floatingCallControls').querySelector('.end-call-btn').onclick = endCall;
                
            } catch (error) {
                console.error('Error accepting call:', error);
                showToast('Failed to accept call: ' + error.message, 'error');
                endCall();
            }
        }
        
        function rejectCall() {
            console.log('❌ Rejecting call');
            stompClient.send("/app/call.reject", {}, JSON.stringify({
                roomId: currentRoomId, toUserId: window.callerId, reason: 'rejected'
            }));
            endCall();
        }
        
        function handleCallAnswer(data) {
            console.log('📞 Received answer');
            if (peerConnection && peerConnection.remoteDescription === null) {
                peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                console.log('✅ Set remote answer');
                document.getElementById('callStatus').innerHTML = 'Connecting...';
            }
        }
        
        function handleIceCandidate(data) {
            console.log('🧊 Received ICE candidate:', data.candidate.type);
            if (peerConnection && peerConnection.remoteDescription) {
                peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            } else {
                pendingIceCandidates.push(data.candidate);
                console.log('📦 Queued ICE candidate');
            }
        }
        
        function handleCallReject(data) {
            console.log('❌ Call rejected');
            showToast(`${data.fromUsername || 'User'} rejected your call`, 'info');
            endCall();
        }
        
        function endCall() {
            if (isEndingCall) return;
            isEndingCall = true;
            
            console.log('🔴 Ending call...');
            
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            if (remoteStream) {
                remoteStream.getTracks().forEach(track => track.stop());
                remoteStream = null;
            }
            
            callActive = false;
            callInProgress = false;
            callType = null;
            isMuted = false;
            pendingIceCandidates = [];
            
            if (callDurationInterval) {
                clearInterval(callDurationInterval);
                callDurationInterval = null;
            }
            
            callStartTime = null;
            
            const remoteVideo = document.getElementById('remoteVideoFloating');
            const localVideo = document.getElementById('localVideoFloating');
            if (remoteVideo) remoteVideo.srcObject = null;
            if (localVideo) localVideo.srcObject = null;
            
            hideFloatingCall();
            
            const muteBtn = document.getElementById('floatingMuteBtn');
            muteBtn.innerHTML = '🔊';
            muteBtn.style.background = '';
            muteBtn.onclick = toggleFloatingMute;
            
            if (stompClient?.connected && currentRoomId && callActive) {
                stompClient.send("/app/call.end", {}, JSON.stringify({ roomId: currentRoomId, fromUserId: userId }));
            }
            
            showToast('Call ended', 'info');
            
            setTimeout(() => { isEndingCall = false; }, 1000);
        }
        
        // ============ WebSocket Functions ==========
        function waitForLibraries() {
            if (typeof Stomp !== 'undefined' && typeof SockJS !== 'undefined') { connectWebSocket(); }
            else if (retryCount < 20) { retryCount++; setTimeout(waitForLibraries, 500); }
            else { showToast('Failed to connect. Please refresh.', 'error'); }
        }
        
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 10;
        
        function connectWebSocket() {
            try {
                const socket = new SockJS('/ws');
                stompClient = Stomp.over(socket);
                stompClient.debug = null;
                
                stompClient.connect({}, 
                    function() {
                        console.log('✅ Connected to WebSocket');
                        reconnectAttempts = 0;
                        showToast('Connected!', 'success');
                        
                        setInterval(() => {
                            if (stompClient && stompClient.connected) {
                                stompClient.send("/app/ping", {}, {});
                            }
                        }, 25000);
                        
                        onConnected();
                    },
                    function(error) {
                        console.error('WebSocket error:', error);
                        reconnectAttempts++;
                        
                        if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                            let delay = Math.min(5000 * reconnectAttempts, 30000);
                            showToast(`Reconnecting in ${delay/1000} sec...`, 'info');
                            setTimeout(connectWebSocket, delay);
                        } else {
                            showToast('Connection failed. Please refresh.', 'error');
                        }
                    }
                );
            } catch (error) {
                console.error('Connection error:', error);
                setTimeout(connectWebSocket, 5000);
            }
        }
        
        function onConnected() {
            showToast('Connected to VioletChat!', 'success');
            
            stompClient.subscribe('/topic/global', msg => { if (currentRoomType === 'GLOBAL') displayMessage(JSON.parse(msg.body)); });
            stompClient.subscribe('/topic/users', msg => updateUsersList(JSON.parse(msg.body)));
            stompClient.subscribe('/user/' + userId + '/queue/invites', handleInvite);
            stompClient.subscribe('/user/' + userId + '/queue/call.offer', msg => handleIncomingCall(JSON.parse(msg.body)));
            stompClient.subscribe('/user/' + userId + '/queue/call.answer', msg => handleCallAnswer(JSON.parse(msg.body)));
            stompClient.subscribe('/user/' + userId + '/queue/call.ice', msg => handleIceCandidate(JSON.parse(msg.body)));
            stompClient.subscribe('/user/' + userId + '/queue/call.reject', msg => handleCallReject(JSON.parse(msg.body)));
            stompClient.subscribe('/user/' + userId + '/queue/call.end', () => endCall());
            
            stompClient.send("/app/chat.join", {}, JSON.stringify({ content: username + " joined", messageType: "TEXT", username: username }));
            stompClient.send("/app/chat.users", {}, {});
            loadRecentMessages();
        }
        
        function handleInvite(invite) {
            const data = JSON.parse(invite.body);
            if (data.type === 'INVITE' && confirm(`${data.fromUser} invited you to join a private room! Accept?`)) {
                fetch('/api/invite/accept?userId=' + userId, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ inviteId: data.inviteId })
                }).then(r => r.json()).then(d => { if (!d.error) switchToPrivateRoom(d.roomId); });
            }
        }
        
        function sendMessage() {
            let input = document.getElementById('messageInput');
            let content = input.value.trim();
            if (!content || !stompClient?.connected) return;
            
            stompClient.send(currentRoomType === 'PRIVATE' ? "/app/chat.private.send" : "/app/chat.send", {}, JSON.stringify({
                content, messageType: "TEXT", userId, username, roomType: currentRoomType, roomId: currentRoomId
            }));
            input.value = '';
        }
        
        function displayMessage(message) {
            const container = document.getElementById('messages');
            const isOwn = message.userId === userId;
            const div = document.createElement('div');
            div.className = 'message' + (isOwn ? ' own' : '');
            div.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">${escapeHtml(message.username)}</span>
                    <span class="message-time">${escapeHtml(message.timestamp)}</span>
                </div>
                <div class="message-content">${escapeHtml(message.content)}</div>
            `;
            container.appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }
        
        function updateUsersList(users) {
            const container = document.getElementById('usersList');
            const otherUsers = (users || []).filter(u => u.id !== userId);
            if (otherUsers.length === 0) {
                container.innerHTML = '<div class="user-item"><div class="user-name">No other users online</div></div>';
            } else {
                container.innerHTML = otherUsers.map(user => `
                    <div class="user-item" onclick="showInviteModal()">
                        <div class="user-name">${escapeHtml(user.username)}</div>
                    </div>
                `).join('');
            }
        }
        
        function loadRecentMessages() {
            fetch('/api/messages/recent?roomType=GLOBAL&limit=50')
                .then(response => response.json())
                .then(messages => {
                    const container = document.getElementById('messages');
                    container.innerHTML = '';
                    if (messages.length === 0) {
                        container.innerHTML = '<div class="message"><div class="message-header"><span class="message-sender">💜 VioletChat</span><span class="message-time">Now</span></div><div class="message-content">✨ Welcome to VioletChat! Start chatting...</div></div>';
                    } else {
                        messages.reverse().forEach(msg => displayMessage(msg));
                    }
                });
        }
        
        function showInviteModal() {
            fetch('/api/users/online')
                .then(response => response.json())
                .then(users => {
                    const otherUsers = users.filter(u => u.id !== userId);
                    const container = document.getElementById('inviteUsersList');
                    if (otherUsers.length === 0) container.innerHTML = '<div class="invite-user-item">No other users online</div>';
                    else {
                        container.innerHTML = otherUsers.map(user => `
                            <div class="invite-user-item" onclick="sendInvite('${user.id}', '${escapeHtml(user.username)}')">
                                👤 ${escapeHtml(user.username)}
                            </div>
                        `).join('');
                    }
                });
            document.getElementById('inviteModal').style.display = 'flex';
        }
        
        function sendInvite(toUserId, toUsername) {
            showToast(`Sending invite to ${toUsername}...`, 'info');
            fetch('/api/invite/send?userId=' + userId, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomId: currentRoomId, toUserId: toUserId })
            }).then(response => response.json())
              .then(data => {
                  if (data.error) showToast(data.error, 'error');
                  else showToast(`Invite sent to ${toUsername}!`, 'success');
              });
            closeModal('inviteModal');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            let div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function openEmojiPicker() {
            let modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'flex';
            const emojis = ['😊', '😂', '❤️', '👍', '🔥', '🎉', '😢', '😡', '😎', '🤔', '🥳', '😍'];
            modal.innerHTML = `
                <div class="modal-content" style="max-width: 450px;">
                    <h3>😊 Choose Emoji</h3>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0;">
                        ${emojis.map(e => `<button onclick="insertEmoji('${e}')" style="margin: 5px; padding: 12px; font-size: 28px; background: var(--surface-2); border: none; border-radius: 12px; cursor: pointer;">${e}</button>`).join('')}
                    </div>
                    <button class="modal-btn-secondary" onclick="this.closest('.modal').remove()">Close</button>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function insertEmoji(emoji) {
            document.getElementById('messageInput').value += emoji;
            document.querySelector('.modal').remove();
        }
        
        function uploadImage() {
            let input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                let file = e.target.files[0];
                if (!file || file.size > 5 * 1024 * 1024) return showToast(file ? 'Image too large' : 'Invalid', 'error');
                let reader = new FileReader();
                reader.onload = function(e) {
                    if (!stompClient?.connected) return showToast('Not connected', 'error');
                    stompClient.send(currentRoomType === 'PRIVATE' ? "/app/chat.private.send" : "/app/chat.send", {}, JSON.stringify({
                        content: "📷 Image", messageType: "IMAGE", userId, username, roomType: currentRoomType,
                        roomId: currentRoomId, imageData: e.target.result
                    }));
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
        
        // Initialize
        window.addEventListener('beforeunload', () => {
            if (callInProgress || callActive) endCall();
            if (stompClient?.connected) {
                if (currentRoomType === 'PRIVATE' && currentRoomId) stompClient.send("/app/chat.private.leave", {}, JSON.stringify({ roomId: currentRoomId, userId, username }));
                stompClient.send("/app/chat.leave", {}, {});
                stompClient.disconnect();
            }
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            if (userId && username) waitForLibraries();
            else window.location.href = '/';
            
            document.getElementById('messageInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
        });
    </script>
</body>
</html>
