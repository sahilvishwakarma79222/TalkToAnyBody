<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<!-- WebRTC Adapter -->
<script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VioletChat - Connect with Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            /* Light Theme Colors */
            --light-bg: #f8f9ff;
            --light-surface: #ffffff;
            --light-surface-2: #f0f2f8;
            --light-border: #e9ecef;
            --light-text: #1a1a2e;
            --light-text-secondary: #6c757d;
            --light-header: #ffffff;
            
            /* Dark Theme Colors */
            --dark-bg: #0f0f1a;
            --dark-surface: #1a1a2e;
            --dark-surface-2: #252538;
            --dark-border: #2d2d44;
            --dark-text: #e9ecef;
            --dark-text-secondary: #a0a0c0;
            --dark-header: #1a1a2e;
            
            /* Brand Colors - Violet & Pink */
            --violet-primary: #8b5cf6;
            --violet-dark: #7c3aed;
            --violet-light: #a78bfa;
            --pink-primary: #ec489a;
            --pink-dark: #db2777;
            --pink-light: #f472b6;
            --gradient-start: #8b5cf6;
            --gradient-end: #ec489a;
            
            /* Status Colors */
            --online: #10b981;
            --offline: #6c757d;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        
        /* Theme Variables */
        body {
            --bg: var(--light-bg);
            --surface: var(--light-surface);
            --surface-2: var(--light-surface-2);
            --border: var(--light-border);
            --text: var(--light-text);
            --text-secondary: var(--light-text-secondary);
            --header: var(--light-header);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        body.dark {
            --bg: var(--dark-bg);
            --surface: var(--dark-surface);
            --surface-2: var(--dark-surface-2);
            --border: var(--dark-border);
            --text: var(--dark-text);
            --text-secondary: var(--dark-text-secondary);
            --header: var(--dark-header);
        }
        
        body {
            background: var(--bg);
            height: 100vh;
            overflow: hidden;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--surface-2);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            border-radius: 4px;
        }
        
        /* Navbar */
        .navbar {
            background: var(--header);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .toggle-sidebar {
            background: var(--surface-2);
            border: none;
            color: var(--text);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .toggle-sidebar:hover {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            color: white;
            transform: scale(1.05);
        }
        
        .nav-title {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .nav-right {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: var(--surface-2);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .nav-btn:hover {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            color: white;
            transform: translateY(-1px);
        }
        
        .leave-room-btn {
            background: linear-gradient(135deg, var(--error), var(--pink-dark));
            color: white;
        }
        
        .theme-toggle {
            background: var(--surface-2);
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .theme-toggle:hover {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            transform: rotate(15deg);
        }
        
        .user-info {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
        }
        
        /* Main Layout */
        .main-layout {
            display: flex;
            height: calc(100vh - 60px);
            position: relative;
        }
        
        /* Sidebar - WhatsApp Style */
        .sidebar {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }
        
        .sidebar.hidden {
            transform: translateX(-100%);
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        
        .sidebar-header h3 {
            color: var(--text);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        
        .room-badge {
            font-size: 0.75rem;
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            padding: 4px 10px;
            border-radius: 12px;
            display: inline-block;
            color: white;
            font-weight: 500;
        }
        
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .user-item {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 4px;
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-item::before {
            content: "👤";
            font-size: 1.2rem;
        }
        
        .user-item:hover {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            color: white;
            transform: translateX(4px);
        }
        
        .user-name {
            font-weight: 500;
        }
        
        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
        }
        
        .chat-header {
            padding: 15px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .chat-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }
        
        .room-id-display {
            font-size: 0.75rem;
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
            color: white;
        }
        
        .call-controls {
            display: flex;
            gap: 8px;
        }
        
        .call-btn {
            background: var(--surface-2);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .call-btn:hover {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            color: white;
        }
        
        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background-image: radial-gradient(circle at 25% 50%, var(--surface-2) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        /* Message Bubbles - WhatsApp Style */
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 18px;
            position: relative;
            animation: fadeInUp 0.3s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message:not(.own) {
            background: var(--surface);
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message.own {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            gap: 12px;
            font-size: 0.7rem;
        }
        
        .message-sender {
            font-weight: 600;
            font-size: 0.75rem;
        }
        
        .message:not(.own) .message-sender {
            color: var(--violet-primary);
        }
        
        .message.own .message-sender {
            color: rgba(255,255,255,0.9);
        }
        
        .message-time {
            font-size: 0.65rem;
            opacity: 0.7;
        }
        
        .message-content {
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        
        /* Input Area */
        .input-area {
            padding: 12px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .input-btn {
            background: var(--surface-2);
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .input-btn:hover {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            transform: scale(1.1);
        }
        
        .message-input {
            flex: 1;
            padding: 12px 18px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text);
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        
        .message-input:focus {
            outline: none;
            border-color: var(--violet-primary);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }
        
        .send-btn {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: var(--surface);
            padding: 28px;
            border-radius: 28px;
            min-width: 300px;
            max-width: 500px;
            animation: modalSlideIn 0.3s ease;
            border: 1px solid var(--border);
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .modal-content h3 {
            color: var(--text);
            margin-bottom: 20px;
            font-size: 1.3rem;
        }
        
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 0.95rem;
        }
        
        .modal-content input:focus {
            outline: none;
            border-color: var(--violet-primary);
        }
        
        .modal-content button {
            padding: 10px 20px;
            margin-right: 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .modal-btn-primary {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            color: white;
        }
        
        .modal-btn-secondary {
            background: var(--surface-2);
            color: var(--text);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 40px;
            border-left: 3px solid var(--violet-primary);
            z-index: 2000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            font-size: 0.9rem;
            white-space: nowrap;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .toast.success {
            border-left-color: var(--success);
        }
        
        .toast.error {
            border-left-color: var(--error);
        }
        
        /* Invite Modal */
        .invite-users-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 15px 0;
        }
        
        .invite-user-item {
            padding: 12px;
            margin: 8px 0;
            background: var(--surface-2);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .invite-user-item:hover {
            background: linear-gradient(135deg, var(--violet-primary), var(--pink-primary));
            color: white;
            transform: translateX(4px);
        }
        
        /* Emoji Picker */
        #emojiPickerContainer {
            position: absolute;
            bottom: 80px;
            left: 20px;
            z-index: 1000;
        }
        
        /* Call Modal */
        #callModal .modal-content {
            max-width: 400px;
            text-align: center;
        }
        
        #localVideo, #remoteVideo {
            margin: 10px 0;
            border-radius: 16px;
            overflow: hidden;
            background: var(--surface-2);
        }
        
        video {
            width: 100%;
            border-radius: 16px;
            background: var(--surface-2);
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                width: 280px;
                z-index: 200;
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }
            
            .sidebar.hidden {
                transform: translateX(-100%);
            }
            
            .message {
                max-width: 85%;
            }
            
            .nav-btn {
                padding: 6px 10px;
                font-size: 0.75rem;
            }
            
            .user-info {
                display: none;
            }
            
            .nav-title {
                font-size: 1rem;
            }
            
            .call-controls {
                gap: 4px;
            }
            
            .call-btn {
                padding: 6px 10px;
                font-size: 0.7rem;
            }
            
            .toast {
                white-space: normal;
                max-width: 90%;
                text-align: center;
            }
        }
        
        @media (max-width: 480px) {
            .navbar {
                padding: 10px 12px;
            }
            
            .nav-right {
                gap: 6px;
            }
            
            .input-area {
                padding: 10px 12px;
            }
            
            .input-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            
            .send-btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            
            .message-input {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            
            .messages-container {
                padding: 12px;
            }
        }
        
        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--surface-2);
            border-top-color: var(--violet-primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Online Status */
        .online-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--online);
            margin-left: 6px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
            <div class="nav-title">💜 VioletChat</div>
        </div>
        <div class="nav-right">
            <button class="nav-btn" onclick="showCreateRoomModal()">➕ Create</button>
            <button class="nav-btn" onclick="showJoinRoomModal()">🔗 Join</button>
            <button class="nav-btn" onclick="joinFixedRoom()">⭐ Fixed</button>
            <button id="leaveRoomBtn" class="nav-btn leave-room-btn" style="display: none;" onclick="leaveRoom()">🚪 Leave</button>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            <div class="user-info" th:text="${username}"></div>
        </div>
    </div>
    
    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>💬 Active Chats</h3>
                <span class="room-badge" id="roomBadge">Global Chat</span>
            </div>
            <div class="users-list" id="usersList">
                <div class="user-item">
                    <div class="user-name">Loading users...</div>
                </div>
            </div>
        </div>
        
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-title" id="chatTitle">Global Chat</div>
                <div class="call-controls" id="callControls" style="display: none;">
                    <button class="call-btn" onclick="startAudioCall()">🎤 Audio</button>
                    <button class="call-btn" onclick="startVideoCall()">📹 Video</button>
                </div>
            </div>
            
            <div class="messages-container" id="messages">
                <div class="message">
                    <div class="message-header">
                        <span class="message-sender">💜 VioletChat</span>
                        <span class="message-time">Now</span>
                    </div>
                    <div class="message-content">✨ Welcome! Start chatting in style...</div>
                </div>
            </div>
            
            <div class="input-area">
                <button class="input-btn" onclick="openEmojiPicker()">😊</button>
                <button class="input-btn" onclick="uploadImage()">📷</button>
                <input type="text" class="message-input" id="messageInput" placeholder="Type a message...">
                <button class="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    
    <!-- Modals -->
    <div id="createRoomModal" class="modal">
        <div class="modal-content">
            <h3>✨ Create Private Space</h3>
            <input type="password" id="roomPassword" placeholder="Set room password">
            <button class="modal-btn-primary" onclick="createRoom()">Create</button>
            <button class="modal-btn-secondary" onclick="closeModal('createRoomModal')">Cancel</button>
        </div>
    </div>
    
    <div id="joinRoomModal" class="modal">
        <div class="modal-content">
            <h3>🔗 Join Private Space</h3>
            <input type="text" id="joinRoomId" placeholder="Room ID">
            <input type="password" id="joinRoomPass" placeholder="Password">
            <button class="modal-btn-primary" onclick="joinRoom()">Join</button>
            <button class="modal-btn-secondary" onclick="closeModal('joinRoomModal')">Cancel</button>
        </div>
    </div>
    
    <div id="inviteModal" class="modal">
        <div class="modal-content">
            <h3>👥 Invite User</h3>
            <div id="inviteUsersList" class="invite-users-list">Loading users...</div>
            <button class="modal-btn-secondary" onclick="closeModal('inviteModal')">Cancel</button>
        </div>
    </div>
    
    <!-- WebSocket Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    
    <script th:inline="javascript">
        /*<![CDATA[*/
        let currentRoomType = 'GLOBAL';
        let currentRoomId = null;
        let userId = /*[[${userId}]]*/ null;
        let username = /*[[${username}]]*/ null;
        let stompClient = null;
        let retryCount = 0;
        /*]]>*/
    </script>
    
    <script>
        // ============ UI Functions ============
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }
        
        // Load saved theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
        
        function showCreateRoomModal() {
            document.getElementById('createRoomModal').style.display = 'flex';
        }
        
        function showJoinRoomModal() {
            document.getElementById('joinRoomModal').style.display = 'flex';
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        
        function showToast(message, type) {
            let toast = document.createElement('div');
            toast.className = 'toast ' + (type || 'info');
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        // All your existing functions remain EXACTLY the same
        // Create Private Room
        function createRoom() {
            let password = document.getElementById('roomPassword').value;
            if (!password) {
                showToast('Please enter a password', 'error');
                return;
            }
            
            showToast('Creating room...', 'info');

        // WebSocket Functions
        function waitForLibraries() {
            if (typeof Stomp !== 'undefined' && typeof SockJS !== 'undefined') {
                console.log('✅ Libraries loaded');
                connectWebSocket();
            } else if (retryCount < 20) {
                retryCount++;
                console.log('Waiting for libraries... attempt ' + retryCount);
                setTimeout(waitForLibraries, 500);
            } else {
                console.error('Failed to load libraries');
                showToast('Failed to connect. Please refresh the page.', 'error');
            }
        }
        
        function connectWebSocket() {
            try {
                const socket = new SockJS('/ws');
                stompClient = Stomp.over(socket);
                stompClient.connect({}, onConnected, onError);
            } catch (error) {
                console.error('Connection error:', error);
                showToast('Connection failed. Retrying...', 'error');
                setTimeout(connectWebSocket, 5000);
            }
        }
        
        function onConnected(frame) {
            console.log('✅ Connected to WebSocket');
            showToast('Connected to VioletChat!', 'success');
            
            stompClient.subscribe('/topic/global', function(message) {
                if (currentRoomType === 'GLOBAL') {
                    const msg = JSON.parse(message.body);
                    displayMessage(msg);
                }
            });
            
            stompClient.subscribe('/topic/users', function(users) {
                const userList = JSON.parse(users.body);
                updateUsersList(userList);
            });
            
            stompClient.subscribe('/user/' + userId + '/queue/invites', function(invite) {
                const data = JSON.parse(invite.body);
                handleInvite(data);
            });
            
            stompClient.subscribe('/user/' + userId + '/queue/call.offer', function(message) {
                const data = JSON.parse(message.body);
                handleIncomingCall(data);
            });
            
            stompClient.subscribe('/user/' + userId + '/queue/call.answer', function(message) {
                const data = JSON.parse(message.body);
                handleCallAnswer(data);
            });
            
            stompClient.subscribe('/user/' + userId + '/queue/call.ice', function(message) {
                const data = JSON.parse(message.body);
                handleIceCandidate(data);
            });
            
            stompClient.subscribe('/user/' + userId + '/queue/call.reject', function(message) {
                const data = JSON.parse(message.body);
                handleCallReject(data);
            });
            
            stompClient.subscribe('/user/' + userId + '/queue/call.end', function(message) {
                const data = JSON.parse(message.body);
                if (!callInProgress) return;
                showToast('Call ended by other user', 'info');
                endCall();
            });
            
            stompClient.send("/app/chat.join", {}, JSON.stringify({
                content: username + " joined",
                messageType: "TEXT",
                username: username
            }));
            
            stompClient.send("/app/chat.users", {}, {});
            loadRecentMessages();
        }
        
        function onError(error) {
            console.error('WebSocket error:', error);
            showToast('Connection lost. Reconnecting...', 'error');
            setTimeout(connectWebSocket, 5000);
        }

        // WebRTC Call Functions
        let peerConnection = null;
        let localStream = null;
        let remoteStream = null;
        let callType = null;
        let callActive = false;
        let callInProgress = false;
        
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        function startAudioCall() {
            if (currentRoomType !== 'PRIVATE') {
                showToast('Calls are only available in private rooms!', 'error');
                return;
            }
            startCall('audio');
        }
        
        function startVideoCall() {
            if (currentRoomType !== 'PRIVATE') {
                showToast('Calls are only available in private rooms!', 'error');
                return;
            }
            startCall('video');
        }
        
        async function startCall(type) {
            if (callInProgress) {
                showToast('Call already in progress!', 'error');
                return;
            }
            
            callType = type;
            callInProgress = true;
            
            try {
                const constraints = type === 'video' 
                    ? { audio: true, video: true }
                    : { audio: true, video: false };
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                if (type === 'video') {
                    document.getElementById('localVideoElement').srcObject = localStream;
                    document.getElementById('localVideo').style.display = 'block';
                }
                
                createPeerConnection();
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                stompClient.send("/app/call.offer", {}, JSON.stringify({
                    roomId: currentRoomId,
                    fromUserId: userId,
                    fromUsername: username,
                    callType: callType,
                    offer: offer
                }));
                
                showToast(`Calling...`, 'info');
                showCallModal('Calling...', 'Waiting for response...');
                
            } catch (error) {
                console.error('Error starting call:', error);
                showToast('Failed to start call. Check camera/mic permissions.', 'error');
                endCall();
            }
        }
        
        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    stompClient.send("/app/call.ice", {}, JSON.stringify({
                        roomId: currentRoomId,
                        fromUserId: userId,
                        candidate: event.candidate
                    }));
                }
            };
            
            peerConnection.ontrack = (event) => {
                remoteStream = event.streams[0];
                
                if (callType === 'video') {
                    const remoteVideo = document.getElementById('remoteVideoElement');
                    remoteVideo.srcObject = remoteStream;
                    document.getElementById('remoteVideo').style.display = 'block';
                } else {
                    const audio = new Audio();
                    audio.srcObject = remoteStream;
                    audio.play();
                }
                
                callActive = true;
                updateCallControls();
            };
            
            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'connected') {
                    showToast('Call connected!', 'success');
                    callActive = true;
                    updateCallControls();
                } else if (peerConnection.connectionState === 'disconnected' || 
                           peerConnection.connectionState === 'failed') {
                    showToast('Call ended', 'info');
                    endCall();
                }
            };
        }
        
        function handleIncomingCall(data) {
            if (callInProgress) {
                stompClient.send("/app/call.reject", {}, JSON.stringify({
                    roomId: data.roomId,
                    toUserId: data.fromUserId,
                    reason: 'busy'
                }));
                return;
            }
            
            callType = data.callType;
            callInProgress = true;
            
            window.pendingOffer = data.offer;
            window.callerId = data.fromUserId;
            window.callerName = data.fromUsername;
            
            const modal = document.getElementById('callModal');
            document.getElementById('callModalTitle').innerHTML = '📞 Incoming Call';
            document.getElementById('callerInfo').innerHTML = `${data.fromUsername} is calling you (${data.callType === 'video' ? 'Video' : 'Audio'} call)`;
            document.getElementById('acceptCallBtn').style.display = 'inline-block';
            document.getElementById('rejectCallBtn').style.display = 'inline-block';
            document.getElementById('endCallBtn').style.display = 'none';
            document.getElementById('muteCallBtn').style.display = 'none';
            document.getElementById('localVideo').style.display = 'none';
            document.getElementById('remoteVideo').style.display = 'none';
            modal.style.display = 'flex';
            
            document.getElementById('acceptCallBtn').onclick = () => acceptCall();
            document.getElementById('rejectCallBtn').onclick = () => rejectCall();
        }
        
        async function acceptCall() {
            const modal = document.getElementById('callModal');
            modal.style.display = 'none';
            
            try {
                const constraints = callType === 'video' 
                    ? { audio: true, video: true }
                    : { audio: true, video: false };
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                if (callType === 'video') {
                    document.getElementById('localVideoElement').srcObject = localStream;
                    document.getElementById('localVideo').style.display = 'block';
                }
                
                createPeerConnection();
                
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                await peerConnection.setRemoteDescription(new RTCSessionDescription(window.pendingOffer));
                
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                stompClient.send("/app/call.answer", {}, JSON.stringify({
                    roomId: currentRoomId,
                    toUserId: window.callerId,
                    answer: answer
                }));
                
                showToast('Call connected!', 'success');
                callActive = true;
                updateCallControls();
                
            } catch (error) {
                console.error('Error accepting call:', error);
                showToast('Failed to accept call', 'error');
                endCall();
            }
        }
        
        function rejectCall() {
            const modal = document.getElementById('callModal');
            modal.style.display = 'none';
            
            stompClient.send("/app/call.reject", {}, JSON.stringify({
                roomId: currentRoomId,
                toUserId: window.callerId,
                reason: 'rejected'
            }));
            
            callInProgress = false;
            showToast('Call rejected', 'info');
        }
        
        function handleCallAnswer(data) {
            if (peerConnection && peerConnection.remoteDescription === null) {
                peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                showToast('Call connected!', 'success');
                updateCallControls();
            }
        }
        
        function handleIceCandidate(data) {
            if (peerConnection) {
                peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        }
        
        function handleCallReject(data) {
            showToast(`${data.fromUsername || 'User'} rejected your call`, 'info');
            endCall();
        }
        
        function endCall() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            remoteStream = null;
            callActive = false;
            callInProgress = false;
            callType = null;
            
            document.getElementById('localVideo').style.display = 'none';
            document.getElementById('remoteVideo').style.display = 'none';
            
            const modal = document.getElementById('callModal');
            modal.style.display = 'none';
            
            if (callActive && stompClient && stompClient.connected) {
                stompClient.send("/app/call.end", {}, JSON.stringify({
                    roomId: currentRoomId,
                    fromUserId: userId
                }));
            }
            
            showToast('Call ended', 'info');
        }
        
        let isMuted = false;
        function toggleMute() {
            if (localStream) {
                const audioTracks = localStream.getAudioTracks();
                audioTracks.forEach(track => {
                    track.enabled = !track.enabled;
                });
                isMuted = !isMuted;
                const muteBtn = document.getElementById('muteCallBtn');
                muteBtn.innerHTML = isMuted ? '🔇 Unmute' : '🔊 Mute';
                showToast(isMuted ? 'Microphone muted' : 'Microphone unmuted', 'info');
            }
        }
        
        function showCallModal(title, message) {
            const modal = document.getElementById('callModal');
            document.getElementById('callModalTitle').innerHTML = title;
            document.getElementById('callerInfo').innerHTML = message;
            document.getElementById('acceptCallBtn').style.display = 'none';
            document.getElementById('rejectCallBtn').style.display = 'none';
            document.getElementById('endCallBtn').style.display = 'inline-block';
            document.getElementById('muteCallBtn').style.display = 'inline-block';
            document.getElementById('muteCallBtn').onclick = toggleMute;
            document.getElementById('endCallBtn').onclick = endCall;
            modal.style.display = 'flex';
        }
        
        function updateCallControls() {
            const modal = document.getElementById('callModal');
            document.getElementById('callModalTitle').innerHTML = '📞 Call in Progress';
            document.getElementById('callerInfo').innerHTML = 'Connected';
            document.getElementById('acceptCallBtn').style.display = 'none';
            document.getElementById('rejectCallBtn').style.display = 'none';
            document.getElementById('endCallBtn').style.display = 'inline-block';
            document.getElementById('muteCallBtn').style.display = 'inline-block';
            modal.style.display = 'flex';
        }
        
        // Initialize
        window.addEventListener('beforeunload', function() {
            if (stompClient && stompClient.connected) {
                stompClient.send("/app/chat.leave", {}, {});
                stompClient.disconnect();
            }
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, User ID:', userId, 'Username:', username);
            
            if (userId && username) {
                waitForLibraries();
            } else {
                console.error('User not logged in');
                window.location.href = '/';
            }
            
            const msgInput = document.getElementById('messageInput');
            if (msgInput) {
                msgInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        sendMessage();
                    }
                });
            }
        });
    </script>
    
    <div id="emojiPickerContainer" style="position: absolute; bottom: 80px; left: 20px; display: none; z-index: 1000;"></div>
    <input type="file" id="imageInput" accept="image/*" style="display: none;">
    
    <!-- Call Modal -->
    <div id="callModal" class="modal">
        <div class="modal-content" style="max-width: 600px; text-align: center;">
            <h3 id="callModalTitle">Incoming Call</h3>
            <div id="callerInfo" style="margin: 20px 0;"></div>
            <div id="localVideo" style="margin: 10px 0; display: none;">
                <video id="localVideoElement" autoplay muted style="width: 100%; max-height: 300px; border-radius: 16px;"></video>
            </div>
            <div id="remoteVideo" style="margin: 10px 0; display: none;">
                <video id="remoteVideoElement" autoplay style="width: 100%; max-height: 300px; border-radius: 16px;"></video>
            </div>
            <div id="callControls" style="margin-top: 20px;">
                <button id="acceptCallBtn" class="modal-btn-primary" style="background: #10b981;">Accept</button>
                <button id="rejectCallBtn" class="modal-btn-secondary">Reject</button>
                <button id="endCallBtn" class="modal-btn-primary" style="background: #ef4444; display: none;">End Call</button>
                <button id="muteCallBtn" class="modal-btn-secondary" style="display: none;">🔊 Mute</button>
            </div>
        </div>
    </div>
</body>
</html>
