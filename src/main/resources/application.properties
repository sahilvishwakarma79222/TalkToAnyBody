# Application
server.port=${PORT:8080}

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# H2 Database - Simplified URL for better compatibility
spring.datasource.url=jdbc:h2:file:/app/data/chatapp;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - Use H2 dialect with specific settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ✅ H2 Console - ENABLED FOR DEBUGGING
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Fixed Room Configuration
fixed.room.id=jojo
fixed.room.password=123456

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging
logging.level.com.chatapp=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN

# WebSocket Configuration for Render
server.forward-headers-strategy=native
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# Session timeout (increase for video calls)
server.servlet.session.timeout=30m