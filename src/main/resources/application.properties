# Application
server.port=${PORT:8080}

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# H2 Database - File-based for persistence (IMPORTANT for Render)
# Use /app/data for persistent storage on Render
spring.datasource.url=jdbc:h2:file:/app/data/chatapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console - Disable in production for security
spring.h2.console.enabled=false

# Fixed Room Configuration
fixed.room.id=jojo
fixed.room.password=123456

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging - Info level for production
logging.level.com.chatapp=INFO